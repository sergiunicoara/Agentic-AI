syntax = "proto3";

package agent_events.v1;

// AgentEventService is the central contract between the SDK (emitters)
// and the dashboard frontend (subscribers).
service AgentEventService {
  // EmitEvent is called by SDK-instrumented agents to push events into the system.
  rpc EmitEvent(AgentEvent) returns (EmitResponse);

  // SubscribeEvents opens a server-streaming RPC that the frontend uses
  // to receive live agent events via gRPC-Web through Envoy.
  rpc SubscribeEvents(SubscribeRequest) returns (stream AgentEvent);
}

// AgentEvent is the core observability unit — one per span lifecycle event.
message AgentEvent {
  string trace_id        = 1;   // UUID grouping all spans for one task run
  string span_id         = 2;   // UUID for this specific span
  string parent_span_id  = 3;   // empty for root spans
  string agent_name      = 4;   // logical name of the emitting agent
  string event_type      = 5;   // span_start | span_end | llm_call | tool_call | error
  int64  timestamp_ms    = 6;   // Unix epoch milliseconds
  int64  duration_ms     = 7;   // 0 for span_start events
  int32  input_tokens    = 8;
  int32  output_tokens   = 9;
  string model           = 10;  // e.g. "claude-sonnet-4-6"
  string status          = 11;  // ok | error
  string error_message   = 12;
  map<string, string> attributes = 13;  // arbitrary key-value metadata
  string task_id         = 14;  // user-defined task identifier
  string outcome         = 15;  // success | failure | pending
}

// SubscribeRequest is sent by the frontend to open a live event stream.
message SubscribeRequest {
  string session_token          = 1;  // JWT for authentication
  repeated string filter_agents = 2;  // empty = all agents
  string filter_trace_id        = 3;  // empty = all traces
}

// EmitResponse confirms receipt of an emitted event.
message EmitResponse {
  bool accepted = 1;
}
